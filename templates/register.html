{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-lg border-0 rounded-4">
      <div class="card-header bg-primary-custom text-white text-center py-4 rounded-top-4">
        <i class="bi bi-person-plus-fill display-5"></i>
        <h4 class="mt-2 mb-0 fw-bold">Patient Registration</h4>
        <small class="opacity-75">Create your secure Medchain account</small>
      </div>
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('register') }}" novalidate>
          
          <div class="mb-3">
            <label class="form-label fw-semibold">Full Name *</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" name="full_name" class="form-control" placeholder="Your full name" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Email Address *</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" name="email" class="form-control" placeholder="you@email.com" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Phone Number</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-telephone"></i></span>
              <input type="tel" name="phone" class="form-control" placeholder="+91 99999 99999">
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Password * <small class="text-muted fw-normal">(min. 8 characters)</small></label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" id="pwd" class="form-control" placeholder="Create password" required>
              <button class="btn btn-outline-secondary" type="button" onclick="togglePwd('pwd','eye1')">
                <i class="bi bi-eye" id="eye1"></i>
              </button>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Confirm Password *</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
              <input type="password" name="confirm_password" id="cpwd" class="form-control" placeholder="Repeat password" required>
              <button class="btn btn-outline-secondary" type="button" onclick="togglePwd('cpwd','eye2')">
                <i class="bi bi-eye" id="eye2"></i>
              </button>
            </div>
          </div>

          <!-- CAPTCHA -->
          <div class="mb-4">
            <label class="form-label fw-semibold">
              <i class="bi bi-shield-check text-success me-1"></i>CAPTCHA Verification *
            </label>
            <div class="captcha-box p-3 rounded-3 mb-2 text-center">
              <span class="captcha-question">{{ captcha_q }} = ?</span>
            </div>
            <input type="text" name="captcha" class="form-control"
                   placeholder="Enter the answer" required autocomplete="off">
            <div class="form-text text-muted">
              <i class="bi bi-info-circle me-1"></i>Solve the math problem to prevent bots.
            </div>
          </div>

          <button type="submit" class="btn btn-primary-custom w-100 py-2 fw-semibold">
            <i class="bi bi-person-check me-2"></i>Register
          </button>
        </form>

        <p class="text-center mt-3 mb-0">
          <small>Already registered? <a href="{{ url_for('login') }}" class="text-primary fw-semibold">Login here</a></small>
        </p>
      </div>
    </div>
  </div>
</div>

{% endblock %}
{% block scripts %}
<script>
function togglePwd(id, iconId) {
  const p = document.getElementById(id);
  const i = document.getElementById(iconId);
  if (p.type === 'password') { p.type = 'text'; i.className = 'bi bi-eye-slash'; }
  else { p.type = 'password'; i.className = 'bi bi-eye'; }
}
</script>
{% endblock %}
